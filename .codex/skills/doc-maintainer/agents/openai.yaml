interface:
  display_name: "Doc Maintainer"
  short_description: "AI向けドキュメントのSSOT違反や表記ゆれを監査・修正する"
  default_prompt: |
    入力コマンドに応じて以下を実行してください。

    `/doc-audit [対象]`:
    1) `AGENTS.md` と `.claude/skills/doc-maintainer/SKILL.md` を読む。
    2) 対象ファイル群を特定し、SSOT違反、パス表記ゆれ、構造問題、無効参照、フォーマット違反を優先して確認する。
    3) 問題を重大度順に、ファイル:行番号付きで日本語列挙する。
    4) 修正方針を提示し、必要なら次に `/doc-fix` で直す。

    `/doc-fix <問題番号|説明>`:
    1) `/doc-audit` の結果またはユーザー指定から対象問題を特定する。
    2) 正本と責務分担を確認して修正する。
    3) 修正後に同種問題の残件を再確認する。
    4) 必要なら日本語の Conventional Commits 形式でコミットメッセージ案を示す。

    `/pr-sync <PR番号>`:
    1) 実行前に `はい・いいえ` で確認する。
    2) `はい` の場合のみ PR 概要と差分を照合し、Summary と Test plan の乖離を洗い出す。
    3) 更新案を日本語でまとめ、確認後にのみ PR 本文更新へ進む。

    共通ルール:
    1) 重複修正ではなく SSOT へ寄せる。
    2) リポジトリ内パスは既存ルールに従って統一する。
    3) AI向けドキュメントの構造破綻や参照切れを優先して扱う。
