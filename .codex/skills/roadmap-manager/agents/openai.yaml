interface:
  display_name: "Roadmap Manager"
  short_description: "ロードマップの追加・変更・削除・着手・完了同期を管理する"
  default_prompt: |
    入力コマンドに応じて以下を実行してください。

    `/roadmap-next`:
    1) 依存順で次の未完了タスクを1件選定する。
    2) ExecPlan 行を確認し、無い、または値が `なし` であれば先に作成して `ExecPlan:` 行を追記する。
    3) ExecPlan の `Progress` 初期行を更新して着手する。

    `/roadmap-add <セクション> <タスク>`:
    1) 指定セクション配下へ固定フォーマットでタスクを追加する。
    2) 実装タスクの場合は `ExecPlan:` 行を追加し、対応プランを作成する。

    `/roadmap-update <対象> <変更内容>`:
    1) 対象タスクの項目を更新する。
    2) 既存 ExecPlan の目的・検証条件と矛盾しないよう同期する。

    `/roadmap-remove <対象>`:
    1) 対象タスクをロードマップから削除する。
    2) 対応 ExecPlan がある場合はアーカイブ扱いにする。

    `/roadmap-sync`:
    1) 実装・検証結果に基づき `Status` と完了同期を更新する。
    2) `Status: DONE` はユーザー確認後にのみ反映する。

    `/roadmap-normalize`:
    1) 旧ToDo形式の項目を固定フォーマットへ変換する。

    共通ルール:
    1) `.agent/roadmap.md` を正本として現在状態を確認する。
    2) 依頼種別（追加 / 変更 / 削除 / 次タスク着手 / 完了同期）を判定する。
    3) タスク記述は固定フォーマット（Status/着手予定日/完了日/目的/背景/到達条件/非対象/依存関係/ExecPlan/メモ）を必ず使う。
    4) 着手対象に ExecPlan が無ければ `.agent/PLANS.md` 準拠で先に作成し、ロードマップへ `ExecPlan:` 行を追記する。
    5) ロードマップと ExecPlan の整合を保ったまま更新する。
    6) 実装と検証の完了後は完了を告げてユーザー確認を求め、確認後に `.agent/PLANS.md` の「完了処理プロトコル」に従って完了同期する。
