interface:
  display_name: "Roadmap Next Task"
  short_description: "ロードマップから次タスクを選び、必要ならExecPlanを作って着手する"
  default_prompt: |
    以下の順序で進めてください。
    1) `.agent/roadmap.md` を読み、依存順で次に着手すべき `Status: NEXT` のタスクを1件選定する。
    2) すでに実装と検証が完了し、ユーザー確認済みなのに `Status` や `完了日` が未同期の項目があれば先に同期する。
    3) 対象タスクに ExecPlan が無ければ `.agent/PLANS.md` 準拠で新規作成し、ロードマップへ `ExecPlan:` 行を追記する。
    4) ExecPlan の `Progress` と検証手順を更新し、対象タスクを `Status: WIP` にしてから実装に着手する。
    5) 実装と検証の完了後は完了を告げてユーザー確認を求め、確認後に対象タスクの `Status: DONE` / `完了日` を更新する。必要なら親タスクの `Status` も同期する。
    6) `.agent/roadmap.md` の `最終更新` もユーザー確認後に当日へ更新する。
